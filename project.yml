name: CleaningKokoroe
options:
  bundleIdPrefix: com.snarfnet
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "12.0.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_CFBundleDisplayName: "Clean Note"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    INFOPLIST_KEY_GADApplicationIdentifier: "ca-app-pub-9404799280370656~9144444576"
    INFOPLIST_KEY_NSUserTrackingUsageDescription: "To show relevant ads and improve your experience."

targets:
  CleaningKokoroe:
    type: application
    platform: iOS
    sources:
      - CleaningKokoroe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.cleaningkokoroe
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
