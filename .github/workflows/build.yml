name: Build & Upload

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set up ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8

      - name: Clean up old certificates
        continue-on-error: true
        run: |
          pip install pyjwt requests --quiet --break-system-packages 2>/dev/null || pip install pyjwt requests --quiet
          python3 -c "
          import jwt, time, requests
          KEY_ID = 'WDXGY9WX55'
          ISSUER_ID = '2be0734f-943a-4d61-9dc9-5d9045c46fec'
          with open('$HOME/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8') as f:
              key = f.read()
          token = jwt.encode({'iss': ISSUER_ID, 'iat': int(time.time()), 'exp': int(time.time()) + 600, 'aud': 'appstoreconnect-v1'}, key, algorithm='ES256', headers={'kid': KEY_ID})
          headers = {'Authorization': f'Bearer {token}'}
          r = requests.get('https://api.appstoreconnect.apple.com/v1/certificates?limit=200&filter[certificateType]=DEVELOPMENT', headers=headers)
          certs = r.json().get('data', [])
          if len(certs) > 5:
              for c in sorted(certs, key=lambda x: x['attributes'].get('expirationDate',''))[:-2]:
                  requests.delete(f'https://api.appstoreconnect.apple.com/v1/certificates/{c[\"id\"]}', headers=headers)
              print(f'Cleaned {len(certs)-2} old certificates')
          else:
              print(f'{len(certs)} certificates, no cleanup needed')
          "

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project CleaningKokoroe.xcodeproj \
            -scheme CleaningKokoroe

      - name: Archive
        run: |
          xcodebuild archive \
            -project CleaningKokoroe.xcodeproj \
            -scheme CleaningKokoroe \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/CleaningKokoroe.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=83VGKGSQUH \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
            -authenticationKeyID WDXGY9WX55 \
            -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/CleaningKokoroe.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist export_options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
            -authenticationKeyID WDXGY9WX55 \
            -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/export/*.ipa \
            --apiKey WDXGY9WX55 \
            --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec
